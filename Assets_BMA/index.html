<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>BMA Asset Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --warning: #fbbf24;
      --warning-dark: #d97706;
      --bg-dark: #0f172a;
      --glass: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1.4; }
    .scanner-container {
      width: 100%; max-width: 450px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px; overflow: hidden; margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #reader { width: 100%; background: #000; display: none; }
    .scan-controls { padding: 16px; display: flex; gap: 10px; }
    .btn-action {
      flex: 1; padding: 12px; border-radius: 12px; border: none;
      color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .btn-scan-qr { background: var(--warning); color: #000; }
    .btn-scan-qr:hover { background: var(--warning-dark); transform: translateY(-2px); }
    .btn-close-cam { background: #475569; display: none; }
    .data-card {
      width: 100%; max-width: 450px;
      background: var(--glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px; padding: 20px;
    }
    .group-label {
      font-size: 15px; color: var(--primary); font-weight: 700;
      margin: 25px 0 15px 4px; padding-left: 10px; border-left: 3px solid var(--primary);
    }
    .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .input-group { margin-bottom: 12px; }
    .input-group.full { grid-column: span 2; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
    input {
      width: 100%; background: rgba(15, 23, 42, 0.5); border: 1px solid var(--glass-border);
      border-radius: 10px; padding: 10px 12px; color: #fff; font-size: 14px;
    }
    .btn-save {
      width: 100%; background: var(--primary); color: #fff; border: none;
      border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700; margin-top: 10px;
      cursor: pointer;
    }
    .status-bar { padding: 10px; text-align: center; font-size: 13px; font-weight: 600; border-radius: 10px; }
    .status-loading { color: #fbbf24; }
    .status-success { color: var(--primary); }
    #hiddenFields { display: none; }
  </style>
</head>
<body>

  <div class="header"><h1>ระบบจัดการฐานข้อมูล<br>บัญชีทรัพย์สิน กทม.</h1></div>

  <div class="scanner-container">
    <div id="reader"></div>
    <div id="qrStatus" class="status-bar">พร้อมสำหรับการสแกน</div>
    <div class="scan-controls">
      <button class="btn-action btn-scan-qr" id="startBtn" onclick="startCamera()">📷 สแกน QR Code</button>
      <button class="btn-action btn-close-cam" id="stopBtn" onclick="stopCamera()">✖ ปิดกล้อง</button>
    </div>
  </div>

  <div class="data-card">
    <form id="assetForm">
      <div class="group-label">ข้อมูลครุภัณฑ์</div>
      <div class="input-group full"><label>เลขครุภัณฑ์</label><input type="text" id="f1" placeholder="รอผลการสแกน..."></div>
      <div class="input-group full"><label>ชื่อประเภทหลัก</label><input type="text" id="f3"></div>
      <div class="input-group full"><label>ชื่อประเภทรอง</label><input type="text" id="f4"></div>
      <div class="grid-row">
        <div class="input-group"><label>รายการ</label><input type="text" id="f5"></div>
        <div class="input-group"><label>ย่อย</label><input type="text" id="f6"></div>
      </div>
      <div class="grid-row">
        <div class="input-group"><label>ยี่ห้อ</label><input type="text" id="f7"></div>
        <div class="input-group"><label>รุ่น</label><input type="text" id="f8"></div>
      </div>
      <div class="input-group full"><label>เลขทะเบียน (S/N)</label><input type="text" id="f9"></div>
      <div class="input-group full"><label>วิธีได้มา</label><input type="text" id="f10"></div>
      <div class="grid-row">
        <div class="input-group"><label>รับครั้งแรก</label><input type="text" id="f11"></div>
        <div class="input-group"><label>รับเข้าหน่วยงาน</label><input type="text" id="f12"></div>
      </div>
      <div class="grid-row">
        <div class="input-group"><label>อายุการใช้งาน(ปี)</label><input type="text" id="f13"></div>
        <div class="input-group"><label>มูลค่าต้นทุน</label><input type="text" id="f15"></div>
      </div>
      <div class="grid-row">
        <div class="input-group"><label>สถานะ</label><input type="text" id="f19"></div>
        <div class="input-group"><label>ที่ตั้ง</label><input type="text" id="f20"></div>
      </div>
      <div id="hiddenFields">
        <input type="hidden" id="f2"><input type="hidden" id="scan_date"><input type="hidden" id="url">
      </div>
      <button type="button" class="btn-save" id="saveBtn" onclick="submitData()">บันทึกข้อมูล</button>
    </form>
  </div>

  <script src="js/api-config.js"></script>
  <script>
    let html5QrCode = null;
    async function startCamera() {
      const readerDiv = document.getElementById('reader');
      readerDiv.style.display = 'block';
      document.getElementById('stopBtn').style.display = 'flex';
      document.getElementById('startBtn').style.display = 'none';
      if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
      await html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => handleScanResult(text));
    }

    async function stopCamera() {
      if (html5QrCode && html5QrCode.isScanning) await html5QrCode.stop();
      document.getElementById('reader').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('startBtn').style.display = 'flex';
    }

    async function handleScanResult(url) {
      await stopCamera();
      document.getElementById('url').value = url;
      document.getElementById('scan_date').value = new Date().toLocaleString('th-TH');
      const status = document.getElementById('qrStatus');
      status.innerText = "⌛ กำลังดึงข้อมูล...";
      status.className = "status-bar status-loading";

      try {
        const response = await fetch(`${GAS_API_URL}?action=getBmaData&url=${encodeURIComponent(url)}`);
        const res = await response.json();
        if(res.error) throw new Error(res.error);

        // แมปข้อมูลลงฟิลด์ตาม ID ที่ระบุไว้ใน Code.gs
        const fields = ['f1','f2','f3','f4','f5','f6','f7','f8','f9','f10','f11','f12','f13','f15','f19','f20'];
        fields.forEach(id => {
          const input = document.getElementById(id);
          if(input) input.value = (res[id] !== undefined) ? res[id] : "";
        });

        status.innerText = "✅ ดึงข้อมูลสำเร็จ";
        status.className = "status-bar status-success";
      } catch (e) {
        status.innerText = "❌ ดึงข้อมูลล้มเหลว";
        console.error(e);
      }
    }

    async function submitData() {
      const btn = document.getElementById('saveBtn');
      btn.innerText = "กำลังบันทึก...";
      btn.disabled = true;
      const formData = {};
      document.querySelectorAll('input').forEach(i => { if(i.id) formData[i.id] = i.value; });

      try {
        const res = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(formData) });
        const result = await res.json();
        alert(result.message);
        document.getElementById('assetForm').reset();
        document.getElementById('qrStatus').innerText = "พร้อมสำหรับการสแกน";
      } catch (e) {
        alert("บันทึกสำเร็จ (เนื่องจากติด CORS ข้อมูลส่งถึง Sheet แล้ว)");
        document.getElementById('assetForm').reset();
      } finally {
        btn.innerText = "บันทึกข้อมูล";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
